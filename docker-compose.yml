services:
  ivr-chat-api:
    image: atlas-ivr-chat-api:latest
    container_name: atlas_ivr_chat_container
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - GroqSettings__ApiKey=${GROQ_API_KEY}
    restart: always